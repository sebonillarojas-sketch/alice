# OJO: "base" en Netlify es SIEMPRE relativo a la raíz del repo.
# Con base="." el build corría en la raíz (alicia-brain) y el deploy fallaba.
[build]
  base    = "files/alice"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
