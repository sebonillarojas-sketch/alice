<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>test · generador de planos BAM</title>
<style>
  :root { --ink:#373737; --peri:#95ABE8; --orange:#F7643B; --paper:#EFEDE8; --line:#E4E2DC; --soft:#9B998F; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Hanken Grotesk','Helvetica Neue',sans-serif; }
  header { display:flex; align-items:baseline; gap:10px; padding:14px 20px; border-bottom:1px solid var(--line); }
  header h1 { font-size:14px; margin:0; text-transform:lowercase; letter-spacing:.06em; }
  header span { font-family:monospace; font-size:10px; color:var(--soft); }
  .bar { display:flex; flex-wrap:wrap; gap:14px; align-items:center; padding:10px 20px; border-bottom:1px solid var(--line); background:#F4F2EC; }
  .bar .tag { font-family:monospace; font-size:10px; color:var(--peri); font-weight:700; min-width:110px; }
  .bar label { display:flex; align-items:baseline; gap:5px; font-family:monospace; font-size:11px; color:var(--soft); }
  .bar input, .bar select { font-family:monospace; font-size:12px; font-weight:600; color:var(--ink); width:58px;
    text-align:right; border:1px solid var(--line); border-radius:2px; background:#fff; padding:4px 6px; outline:none; }
  .bar select { width:auto; text-align:left; }
  button.go { font-family:monospace; font-size:12px; color:#fff; background:var(--orange); border:none; border-radius:2px;
    padding:8px 18px; cursor:pointer; }
  button.sec { font-family:monospace; font-size:11px; color:var(--ink); background:#fff; border:1px solid var(--line);
    border-radius:2px; padding:7px 12px; cursor:pointer; }
  #status { font-family:monospace; font-size:10.5px; color:var(--soft); }
  #alicia { margin:10px 20px 0; padding:10px 12px; background:#fff; border:1px solid var(--peri); border-left:3px solid var(--peri);
    border-radius:3px; font-family:monospace; font-size:11px; line-height:1.55; white-space:pre-wrap; display:none; }
  h2.paso { font-family:monospace; font-size:11px; color:var(--soft); margin:16px 20px 0; text-transform:lowercase; }
  h2.paso b { color:var(--orange); }
  #partis { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; padding:12px 20px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:3px; padding:10px; }
  .card.sel { outline:2px solid var(--orange); }
  .card h3 { display:flex; gap:8px; align-items:baseline; font-size:12px; margin:8px 0 4px; text-transform:lowercase; }
  .card h3 .n { font-family:monospace; font-size:10px; color:var(--orange); }
  .card h3 .uds { font-family:monospace; font-size:10px; color:var(--soft); font-weight:400; }
  .card .nota { font-family:monospace; font-size:9px; color:var(--soft); line-height:1.5; }
  .card button { margin-top:8px; width:100%; font-family:monospace; font-size:11px; color:#fff; background:var(--orange);
    border:none; border-radius:2px; padding:7px 0; cursor:pointer; }
  #resultado { padding:12px 20px 40px; display:none; }
  #resultado .lam { background:#fff; border:1px solid var(--line); border-radius:3px; padding:10px; }
  #resultado svg { width:100%; height:auto; display:block; cursor:zoom-in; }
  #notas { font-family:monospace; font-size:10px; color:var(--soft); line-height:1.7; margin-top:8px; }
  dialog { border:none; border-radius:4px; padding:0; max-width:96vw; box-shadow:0 12px 60px rgba(0,0,0,.4); }
  dialog svg { width:min(1500px,95vw); height:auto; display:block; }
</style>
</head>
<body>
<header>
  <h1><b style="color:var(--peri)">BAM</b> · banco de pruebas del generador de planos</h1>
  <span>flujo: lote (medianera/esquina + retiros) → distribución → tipologías · módulos reales vía vite</span>
</header>

<!-- PASO 1 · LOTE -->
<div class="bar">
  <span class="tag">1 · lote ▸</span>
  <label>tipo <select id="tipo">
    <option value="medianera" selected>entre medianeras</option>
    <option value="esquina">esquina</option>
  </select></label>
  <label>frente <input id="frente" type="number" value="17" step="0.5" min="5"> m</label>
  <label>fondo <input id="fondo" type="number" value="27" step="0.5" min="5"> m</label>
  <label>retiro frontal <input id="retiro" type="number" value="3" step="0.5" min="0"> m</label>
  <label id="latWrap" style="display:none">retiro calle lateral <input id="retiroLat" type="number" value="3" step="0.5" min="0"> m</label>
  <span id="footInfo" style="font-family:monospace;font-size:10.5px;color:var(--soft)"></span>
</div>

<!-- PASO 2 · DISTRIBUCIÓN -->
<div class="bar">
  <span class="tag">2 · distribución ▸</span>
  <label>uds/piso <input id="uds" type="number" value="4" step="1" min="1"></label>
  <label>área objetivo <input id="area" type="number" value="60" step="5" min="25"> m²</label>
  <label>1D% <input id="p1" type="number" value="25" step="5" min="0" max="100"></label>
  <label>2D% <input id="p2" type="number" value="40" step="5" min="0" max="100"></label>
  <button class="go" id="gen">✦ distribuciones</button>
  <span id="status"></span>
</div>

<!-- PASO 3 · TIPOLOGÍAS -->
<div class="bar">
  <span class="tag">3 · tipologías ▸</span>
  <label>NSE <select id="nse"><option>A</option><option>B</option><option selected>C</option><option>D</option></select></label>
  <label><input id="terr" type="checkbox" checked style="width:auto"> terraza+jardineras</label>
  <button class="go" id="amoblar" disabled>amoblar parti elegido</button>
  <button class="sec" id="ask">opinión de alicia</button>
</div>

<div id="alicia"></div>
<h2 class="paso" id="tituloPartis" style="display:none"><b>elige una distribución</b> (bloques + core + corredor, sin tipologías aún)</h2>
<div id="partis"></div>
<h2 class="paso" id="tituloRes" style="display:none"><b>planta amoblada</b> · clic para zoom</h2>
<div id="resultado"><div class="lam" id="lam"></div><div id="notas"></div></div>
<dialog id="zoom"><div id="zoomIn"></div></dialog>

<script type="module">
// preamble de @vitejs/plugin-react — necesario para importar módulos JSX (simbolos.jsx
// vía lamina.js) desde una página fuera del index.html del app. Solo aplica en dev.
import RefreshRuntime from "/@react-refresh";
RefreshRuntime.injectIntoGlobalHook(window);
window.$RefreshReg$ = () => {};
window.$RefreshSig$ = () => (type) => type;
window.__vite_plugin_react_preamble_installed__ = true;
</script>
<script type="module">
const $ = (id) => document.getElementById(id);
let mods = null, partis = [], elegido = null, amoblado = null;

$("status").textContent = "cargando módulos…";
const [plantas, lamina, geometry] = await Promise.all([
  import("/src/modules/planos/plantas.js"),
  import("/src/modules/planos/lamina.js"),
  import("/src/modules/planos/geometry.js"),
]);
mods = { plantas, lamina, geometry };
$("status").textContent = "módulos listos";

$("tipo").addEventListener("change", () => {
  $("latWrap").style.display = $("tipo").value === "esquina" ? "flex" : "none";
  footInfo();
});
["frente", "fondo", "retiro", "retiroLat"].forEach((id) => $(id).addEventListener("input", footInfo));

// footprint según tipo de lote: medianera → retiro solo al frente;
// esquina → frente + calle lateral (borde derecho). los demás son colindantes.
function footprintActual() {
  const f = +$("frente").value, d = +$("fondo").value;
  const rf = +$("retiro").value;
  const rl = $("tipo").value === "esquina" ? +$("retiroLat").value : 0;
  // frente = borde inferior (y = d); calle lateral = borde derecho (x = f)
  const x1 = f - rl, y1 = d - rf;
  if (x1 < 4 || y1 < 4) return null;
  return [{ x: 0, y: y1 }, { x: x1, y: y1 }, { x: x1, y: 0 }, { x: 0, y: 0 }];
}

function footInfo() {
  const foot = footprintActual();
  $("footInfo").textContent = foot
    ? `footprint ${mods.geometry.area(foot).toFixed(0)} m² · ${(foot[1].x - foot[0].x).toFixed(1)}×${foot[0].y.toFixed(1)} m`
    : "⚠ los retiros dejan el lote sin área construible";
}
footInfo();

// preview simple de un parti (bloques): tinta + core oscuro + etiquetas moradas
function partiSVG(p, W = 300, H = 200) {
  const all = p.rooms.flatMap((r) => r.pts);
  const xs = all.map((q) => q.x), ys = all.map((q) => q.y);
  const w = Math.max(...xs) - Math.min(...xs) || 1, h = Math.max(...ys) - Math.min(...ys) || 1;
  const k = Math.min((W - 16) / w, (H - 16) / h);
  const tx = (W - w * k) / 2 - Math.min(...xs) * k, ty = (H - h * k) / 2 - Math.min(...ys) * k;
  const T = (q) => `${(q.x * k + tx).toFixed(1)},${(q.y * k + ty).toFixed(1)}`;
  const polys = p.rooms.map((r) => {
    const c = r.pts.reduce((a, q) => ({ x: a.x + q.x / r.pts.length, y: a.y + q.y / r.pts.length }), { x: 0, y: 0 });
    const fill = r.tipo === "core" ? "#4A4A4A" : "#fff";
    const label = r.tipo === "core" ? "" :
      `<text x="${(c.x * k + tx).toFixed(1)}" y="${(c.y * k + ty).toFixed(1)}" font-family="monospace" font-size="9" fill="#95ABE8" text-anchor="middle" font-weight="700">${r.name}</text>`;
    return `<polygon points="${r.pts.map(T).join(" ")}" fill="${fill}" stroke="#373737" stroke-width="2"/>` + label;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="background:#fff;width:100%;height:auto;display:block">${polys}</svg>`;
}

function cfgDistrib() {
  return { udsPiso: +$("uds").value || 4, pct1: +$("p1").value || 0, pct2: +$("p2").value || 0, areaObjetivo: +$("area").value || 60 };
}

function generarPartis() {
  const foot = footprintActual();
  if (!foot) { $("status").textContent = "⚠ lote sin área construible"; return; }
  const t0 = performance.now();
  partis = mods.plantas.generarDistribuciones(foot, 0, cfgDistrib());
  $("status").textContent = `${partis.length} distribuciones en ${(performance.now() - t0).toFixed(0)} ms`;
  elegido = null; amoblado = null;
  $("amoblar").disabled = true;
  $("tituloPartis").style.display = "block";
  $("tituloRes").style.display = "none";
  $("resultado").style.display = "none";
  $("alicia").style.display = "none";
  const grid = $("partis");
  grid.innerHTML = "";
  partis.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = `parti-${p.id}`;
    card.innerHTML = `${partiSVG(p)}
      <h3><span class="n">${i + 1}</span> ${p.nombre} <span class="uds">${p.stats.uds} uds</span></h3>
      ${p.notas.map((n) => `<div class="nota">· ${n}</div>`).join("")}
      <button>elegir esta → 3 · tipologías</button>`;
    card.querySelector("button").addEventListener("click", () => {
      elegido = p;
      document.querySelectorAll("#partis .card").forEach((c) => c.classList.remove("sel"));
      card.classList.add("sel");
      $("amoblar").disabled = false;
      amoblarElegido();
    });
    grid.appendChild(card);
  });
}

function amoblarElegido() {
  if (!elegido) return;
  const t0 = performance.now();
  amoblado = mods.plantas.amoblarParti(elegido, { nse: $("nse").value, terraza: $("terr").checked });
  $("status").textContent = `amoblado en ${(performance.now() - t0).toFixed(0)} ms`;
  const svg = mods.lamina.laminaSVG({ rooms: amoblado.rooms, items: amoblado.items, muro: 0.15 }, {
    proyecto: `${elegido.nombre}`, tipo: "Edificio Multifamiliar",
    ubicacion: `lote ${$("tipo").value} · ${$("frente").value}×${$("fondo").value} m`,
    cliente: "—", responsable: "generador BAM", plano: "Planta típica", escala: "s/e", lamina: "T-01",
  });
  $("lam").innerHTML = svg;
  $("lam").querySelector("svg").addEventListener("click", () => {
    $("zoomIn").innerHTML = svg;
    $("zoom").showModal();
  });
  $("notas").innerHTML = amoblado.notas.map((n) => `· ${n}`).join("<br>");
  $("tituloRes").style.display = "block";
  $("resultado").style.display = "block";
  $("resultado").scrollIntoView({ behavior: "smooth" });
}

async function preguntarAlicia() {
  if (!amoblado) { $("status").textContent = "amuebla primero"; return; }
  const box = $("alicia");
  box.style.display = "block";
  box.textContent = "consultando a alicia…";
  try {
    const res = await fetch("https://aliceai.bam.pe/api/analyze", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: "Sos Alicia, arquitecta senior de BAM (vivienda multifamiliar en Lima). Evaluás una planta típica amoblada con criterio de diseño, RNE A.010/A.020 y mercado limeño. Respondé en máx. 6 líneas.",
        prompt: `Lote ${$("tipo").value} ${$("frente").value}×${$("fondo").value} m. Parti: ${elegido.nombre}. NSE ${$("nse").value}.\nResultado: ${amoblado.notas.join(" | ")}`,
        max_tokens: 500,
      }),
    });
    const data = await res.json();
    box.textContent = data.text || data.error || "sin respuesta";
  } catch (e) { box.textContent = "no se pudo consultar: " + e.message; }
}

$("gen").addEventListener("click", generarPartis);
$("amoblar").addEventListener("click", amoblarElegido);
$("nse").addEventListener("change", () => amoblado && amoblarElegido());
$("terr").addEventListener("change", () => amoblado && amoblarElegido());
$("ask").addEventListener("click", preguntarAlicia);
$("zoom").addEventListener("click", () => $("zoom").close());

generarPartis();
</script>
</body>
</html>
