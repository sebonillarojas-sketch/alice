# Chequeo de sintaxis del backend en cada push — atrapa errores tipo
# "variable sin declarar" (como el que tumbó Nexo) antes de que lleguen
# a producción. El deploy real lo hacen Railway (main) y Netlify (manual);
# este workflow solo avisa, no despliega.

name: Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sintaxis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sintaxis del backend (alicia-brain + erp-backend)
        run: |
          set -e
          for f in $(find alicia-brain/src erp-backend/scripts -name "*.js" 2>/dev/null); do
            node --check "$f"
          done
          echo "✅ Sintaxis OK"
